<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRIS - Đăng nhập / 로그인</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 50%, #1a8fe3 100%);
    font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    padding: 48px 40px 40px;
    width: 100%;
    max-width: 400px;
    position: relative;
  }

  .lang-toggle {
    position: absolute;
    top: 16px; right: 16px;
    display: flex; gap: 4px;
  }
  .lang-btn {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid #d1d5db;
    background: #f9fafb; color: #6b7280;
    transition: all .15s;
  }
  .lang-btn.active { background: #1e3a5f; color: #fff; border-color: #1e3a5f; }
  .lang-btn:hover:not(.active) { background: #f3f4f6; color: #374151; }

  .logo { text-align: center; margin-bottom: 32px; }
  .logo-icon {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, #1e3a5f, #1a8fe3);
    border-radius: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 12px;
  }
  .logo h1 { font-size: 22px; color: #1e3a5f; font-weight: 700; }
  .logo p  { font-size: 13px; color: #6b7280; margin-top: 4px; }

  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block; font-size: 13px; font-weight: 600;
    color: #374151; margin-bottom: 6px;
  }
  .form-group input {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid #d1d5db; border-radius: 8px;
    font-size: 15px; color: #111827;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  .form-group input:focus {
    border-color: #1a8fe3;
    box-shadow: 0 0 0 3px rgba(26,143,227,.15);
  }

  .btn-login {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #1e3a5f, #1a8fe3);
    color: #fff; border: none; border-radius: 8px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    transition: opacity .2s, transform .1s;
    margin-top: 8px;
  }
  .btn-login:hover   { opacity: .92; }
  .btn-login:active  { transform: scale(.98); }
  .btn-login:disabled { opacity: .6; cursor: not-allowed; }

  .error-msg {
    background: #fef2f2; border: 1px solid #fecaca;
    color: #dc2626; border-radius: 8px;
    padding: 10px 14px; font-size: 13px;
    margin-top: 14px; display: none;
  }
  .error-msg.show { display: block; }

  .footer { text-align: center; margin-top: 24px; color: #9ca3af; font-size: 12px; }
</style>
</head>
<body>

<div class="card">
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-lang-ko" onclick="setLang('ko')">🇰🇷 KO</button>
    <button class="lang-btn"        id="btn-lang-vi" onclick="setLang('vi')">🇻🇳 VI</button>
  </div>

  <div class="logo">
    <div class="logo-icon">🏢</div>
    <h1>HRIS</h1>
    <p id="login-subtitle">Human Resource Information System</p>
  </div>

  <form id="login-form">
    <div class="form-group">
      <label for="email" id="label-email">이메일</label>
      <input type="email" id="email" placeholder="이메일을 입력하세요" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password" id="label-password">비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login" id="btn-login">로그인</button>
    <div class="error-msg" id="error-msg"></div>
  </form>

  <div class="footer">© 2025 SANICO VINA. All rights reserved.</div>
</div>

<script>
  const RAILWAY_URL = 'https://hris-production-ec7b.up.railway.app';

  const LOGIN_LANG = {
    ko: {
      subtitle:            'Human Resource Information System',
      labelEmail:          '이메일',
      labelPassword:       '비밀번호',
      placeholderEmail:    '이메일을 입력하세요',
      placeholderPassword: '비밀번호를 입력하세요',
      btnLogin:            '로그인',
      btnLoading:          '로그인 중...',
      errInvalid:          '이메일 또는 비밀번호가 올바르지 않습니다.',
      errServer:           '서버 오류가 발생했습니다. 다시 시도해 주세요.',
      errDefault:          '로그인 실패',
    },
    vi: {
      subtitle:            'Hệ thống quản lý nhân sự',
      labelEmail:          'Email',
      labelPassword:       'Mật khẩu',
      placeholderEmail:    'Nhập địa chỉ email',
      placeholderPassword: 'Nhập mật khẩu',
      btnLogin:            'Đăng nhập',
      btnLoading:          'Đang đăng nhập...',
      errInvalid:          'Email hoặc mật khẩu không đúng.',
      errServer:           'Lỗi máy chủ. Vui lòng thử lại.',
      errDefault:          'Đăng nhập thất bại',
    }
  };

  let currentLang = localStorage.getItem('lang') || 'ko';

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('lang', lang);
    applyLoginLang();
  }

  function applyLoginLang() {
    const l = LOGIN_LANG[currentLang] || LOGIN_LANG.ko;
    const btnLogin = document.getElementById('btn-login');
    document.documentElement.lang = currentLang === 'ko' ? 'ko' : 'vi';
    document.getElementById('login-subtitle').textContent      = l.subtitle;
    document.getElementById('label-email').textContent         = l.labelEmail;
    document.getElementById('label-password').textContent      = l.labelPassword;
    document.getElementById('email').placeholder               = l.placeholderEmail;
    document.getElementById('password').placeholder            = l.placeholderPassword;
    if (!btnLogin.disabled) btnLogin.textContent               = l.btnLogin;
    document.getElementById('btn-lang-ko').className = 'lang-btn' + (currentLang === 'ko' ? ' active' : '');
    document.getElementById('btn-lang-vi').className = 'lang-btn' + (currentLang === 'vi' ? ' active' : '');
  }

  applyLoginLang();

  // 이미 로그인된 경우 리다이렉트
  const token = localStorage.getItem('hris_token');
  if (token) {
    const user = JSON.parse(localStorage.getItem('hris_user') || '{}');
    location.href = RAILWAY_URL + ((user.role === 'admin' || user.role === 'staff') ? '/admin.html' : '/dashboard.html');
  }

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const l     = LOGIN_LANG[currentLang] || LOGIN_LANG.ko;
    const btn   = document.getElementById('btn-login');
    const errEl = document.getElementById('error-msg');
    errEl.classList.remove('show');
    btn.disabled = true;
    btn.textContent = l.btnLoading;

    try {
      const res = await fetch(RAILWAY_URL + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || l.errDefault);

      const page = (data.user.role === 'admin' || data.user.role === 'staff') ? '/admin.html' : '/dashboard.html';
      const hash = '#token=' + encodeURIComponent(data.token) + '&user=' + encodeURIComponent(JSON.stringify(data.user));
      location.href = RAILWAY_URL + page + hash;
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = l.btnLogin;
    }
  });
</script>
</body>
</html>
