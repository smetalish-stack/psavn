<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calibration Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0B2458 0%, #1a3a7a 50%, #0096D6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrap { width: 100%; max-width: 400px; padding: 20px; }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo .logo-icon { font-size: 48px; display: block; margin-bottom: 10px; }
        .login-logo h1 { color: white; font-size: 20px; font-weight: 700; }
        .login-logo p { color: rgba(255,255,255,.65); font-size: 13px; margin-top: 4px; }
        .login-card { background: white; border-radius: 12px; padding: 36px 32px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
        .login-card h2 { font-size: 18px; font-weight: 700; color: #1f2937; margin-bottom: 24px; text-align: center; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
        .field input { width: 100%; padding: 11px 14px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px; font-family: inherit; transition: border-color .2s; outline: none; }
        .field input:focus { border-color: #0096D6; }
        .btn-login { width: 100%; padding: 13px; background: #0B2458; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 8px; transition: background .2s; }
        .btn-login:hover { background: #081a3e; }
        .btn-login:disabled { background: #9ca3af; cursor: not-allowed; }
        .error-msg { background: #fee2e2; color: #dc2626; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-top: 14px; text-align: center; display: none; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: rgba(255,255,255,.7); font-size: 13px; text-decoration: none; }
        .back-link a:hover { color: white; }
        .lang-bar { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; }
        .lang-bar button { padding: 4px 12px; border: 1.5px solid rgba(255,255,255,.4); background: transparent; color: rgba(255,255,255,.7); border-radius: 20px; font-size: 12px; font-family: inherit; cursor: pointer; transition: all .2s; }
        .lang-bar button:hover, .lang-bar button.active { background: rgba(255,255,255,.2); color: white; border-color: rgba(255,255,255,.8); }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="lang-bar">
            <button data-lang-btn="vi" onclick="setLoginLang('vi')">VI</button>
            <button data-lang-btn="ko" onclick="setLoginLang('ko')">한국어</button>
            <button data-lang-btn="en" onclick="setLoginLang('en')">EN</button>
        </div>

        <div class="login-logo">
            <span class="logo-icon">🔧</span>
            <h1 data-i18n="login.title">Hệ thống quản lý hiệu chuẩn</h1>
            <p data-i18n="login.subtitle">Calibration Equipment Management System</p>
        </div>

        <div class="login-card">
            <h2 data-i18n="login.heading">Đăng nhập</h2>
            <div class="field">
                <label for="username" data-i18n="login.username">Tên đăng nhập</label>
                <input type="text" id="username" data-i18n-placeholder="login.username_placeholder"
                       placeholder="Nhập tên đăng nhập" autocomplete="username">
            </div>
            <div class="field">
                <label for="password" data-i18n="login.password">Mật khẩu</label>
                <input type="password" id="password" data-i18n-placeholder="login.password_placeholder"
                       placeholder="Nhập mật khẩu" autocomplete="current-password">
            </div>
            <button class="btn-login" id="btn-login" onclick="doLogin()" data-i18n="login.submit">Đăng nhập</button>
            <div class="error-msg" id="error-msg"></div>
        </div>

        <div class="back-link">
            <a href="../" data-i18n="login.back">← Quay lại psavn.com</a>
        </div>
    </div>

    <script>
        const API_BASE = 'https://calibration-server-production.up.railway.app';
        const SUPPORTED_LANGS = ['vi', 'ko', 'en'];
        let _trans = {};
        let _lang = 'vi';

        (function() {
            if (sessionStorage.getItem('cal_token')) window.location.replace('index.html');
        })();

        async function _loadLang(lang) {
            if (_trans[lang]) return;
            try { const r = await fetch(`lang/${lang}.json`); _trans[lang] = await r.json(); }
            catch(e) { _trans[lang] = {}; }
        }

        function _t(key) {
            const keys = key.split('.');
            let v = _trans[_lang];
            for (const k of keys) { if (v && typeof v === 'object') v = v[k]; else return key; }
            return typeof v === 'string' ? v : key;
        }

        function _apply() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const v = _t(el.getAttribute('data-i18n'));
                if (el.tagName === 'BUTTON' || el.tagName === 'A' || el.tagName === 'H1' || el.tagName === 'H2' || el.tagName === 'P' || el.tagName === 'LABEL') el.textContent = v;
                else el.textContent = v;
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                el.placeholder = _t(el.getAttribute('data-i18n-placeholder'));
            });
            document.querySelectorAll('[data-lang-btn]').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang-btn') === _lang);
            });
            document.documentElement.lang = _lang;
            document.title = _t('login.title');
        }

        async function setLoginLang(lang) {
            if (!SUPPORTED_LANGS.includes(lang)) return;
            _lang = lang;
            localStorage.setItem('cal_lang', lang);
            await _loadLang(lang);
            _apply();
        }

        (async function() {
            const stored = localStorage.getItem('cal_lang');
            const browser = navigator.language.slice(0, 2);
            if (stored && SUPPORTED_LANGS.includes(stored)) _lang = stored;
            else if (SUPPORTED_LANGS.includes(browser)) _lang = browser;
            await _loadLang(_lang);
            _apply();
        })();

        document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const errEl = document.getElementById('error-msg');
            if (!username || !password) { showError(_t('login.error_empty')); return; }
            btn.disabled = true;
            btn.textContent = _t('login.submitting');
            errEl.style.display = 'none';
            try {
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    sessionStorage.setItem('cal_token', data.token);
                    window.location.replace('index.html');
                } else {
                    showError(data.error || _t('login.error_failed'));
                }
            } catch (e) {
                showError(_t('login.error_server'));
            } finally {
                btn.disabled = false;
                btn.textContent = _t('login.submit');
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
