<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a2352"/>
      <stop offset="0.55" stop-color="#0c1e44"/>
      <stop offset="1" stop-color="#081733"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#1e78d6" stop-opacity="0.38"/>
      <stop offset="0.5" stop-color="#1257a8" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0a1f44" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f7fd0" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#54a6ef" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2f7fd0" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="400" height="220" fill="url(#bg)"/>
  <rect width="400" height="220" fill="url(#glow)"/>

  <!-- circuit traces -->
  <g fill="none" stroke="url(#trace)" stroke-width="1.4">
    <path d="M0 34 H70 L92 56 H150"/>
    <path d="M400 30 H330 L308 52 H250"/>
    <path d="M0 96 H48 L66 78 H120"/>
    <path d="M400 118 H352 L332 136 H286"/>
    <path d="M0 168 H90 L112 146 H164"/>
    <path d="M400 176 H300 L280 196 H214"/>
    <path d="M60 220 V182 L80 162 V120"/>
    <path d="M340 0 V40 L322 60 V104"/>
  </g>
  <g fill="none" stroke="#3f8ede" stroke-opacity="0.25" stroke-width="0.8">
    <path d="M0 58 H400"/>
    <path d="M0 140 H400"/>
    <path d="M130 0 V220"/>
    <path d="M270 0 V220"/>
  </g>

  <!-- connection pads / nodes -->
  <g fill="#5aa8f0">
    <circle cx="150" cy="56" r="3.2" fill-opacity="0.9"/>
    <circle cx="250" cy="52" r="3.2" fill-opacity="0.9"/>
    <circle cx="120" cy="78" r="2.6" fill-opacity="0.8"/>
    <circle cx="286" cy="136" r="2.6" fill-opacity="0.8"/>
    <circle cx="164" cy="146" r="3" fill-opacity="0.85"/>
    <circle cx="214" cy="196" r="3" fill-opacity="0.85"/>
    <circle cx="80" cy="120" r="2.4" fill-opacity="0.7"/>
    <circle cx="322" cy="104" r="2.4" fill-opacity="0.7"/>
  </g>
  <g fill="none" stroke="#6fb4f2" stroke-opacity="0.5" stroke-width="1">
    <rect x="18" y="28" width="14" height="10" rx="2"/>
    <rect x="368" y="24" width="14" height="10" rx="2"/>
    <rect x="22" y="160" width="12" height="9" rx="2"/>
    <rect x="366" y="170" width="12" height="9" rx="2"/>
  </g>

  <!-- faint hex accents -->
  <g fill="none" stroke="#4a95e6" stroke-opacity="0.14" stroke-width="1">
    <polygon points="356,150 372,159 372,177 356,186 340,177 340,159"/>
    <polygon points="34,74 50,83 50,101 34,110 18,101 18,83"/>
  </g>

  <!-- subtle vignette -->
  <rect width="400" height="220" fill="#040d22" opacity="0.12"/>
</svg>
